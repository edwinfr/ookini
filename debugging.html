<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Ookini - Reservar</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 400px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body style="background-color: aquamarine;">
  <h1>Reservar en Ookini</h1>
  <label for="cantidad">¿Cuántas tazas quieres reservar?</label>
  <input type="text" id="cantidad">
  <button id="reservar">Reservar</button>

  <script>
    function puedeReservar(cantidad) {
      if (cantidad > 2) {
        return false;
      }
      return true;
    }

    const input = document.querySelector("#cantidad");
    const boton = document.querySelector("#reservar");

    boton.addEventListener("click", function () {
      const cantidad = input.value;
      console.log("La cantidad es:", cantidad); 
      console.log("El tipo es:", typeof cantidad);
      if (puedeReservar(cantidad)) {
        alert("Reserva confirmada");
      } else {
        alert("No se puede reservar esa cantidad");
      }
    });
  </script>
</body>

</html>
